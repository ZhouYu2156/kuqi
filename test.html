<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div id="qrcode"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator/qrcode.js"></script>

  <script>
    var qr = qrcode(8, 'M')
    qr.addData("weixin://wxpay/bizpayurl?pr=aKJwKuOz3")
    qr.make()
    document.getElementById('qrcode').innerHTML = qr.createImgTag(); // 将生成的二维码插入到页面中
  </script>
</body>

</html>
